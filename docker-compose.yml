version: '3.8'

services:
  flutter_ui:
    build:
      context: ./audio_eda_ui
    ports:
      - "8081:80"
    volumes:
      - ./audio_eda_ui/lib:/app/lib
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    restart: unless-stopped
